<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #faf8ef; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.container { text-align: center; }
h1 { font-size: 64px; font-weight: 700; color: #776e65; margin-bottom: 10px; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
.scores { display: flex; gap: 8px; }
.score-box { background: #bbada0; color: #fff; border-radius: 6px; padding: 8px 20px; text-align: center; min-width: 80px; }
.score-box .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #eee4da; }
.score-box .value { font-size: 22px; font-weight: 700; }
.btn { background: #8f7a66; color: #f9f6f2; border: none; border-radius: 6px; padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
.btn:hover { background: #9f8b77; }
.board { background: #bbada0; border-radius: 8px; padding: 12px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 400px; height: 400px; position: relative; touch-action: none; }
.tile { background: #cdc1b4; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; color: #776e65; transition: all 0.15s ease; }
.tile[data-value="2"] { background: #eee4da; }
.tile[data-value="4"] { background: #ede0c8; }
.tile[data-value="8"] { background: #f2b179; color: #f9f6f2; }
.tile[data-value="16"] { background: #f59563; color: #f9f6f2; }
.tile[data-value="32"] { background: #f67c5f; color: #f9f6f2; }
.tile[data-value="64"] { background: #f65e3b; color: #f9f6f2; }
.tile[data-value="128"] { background: #edcf72; color: #f9f6f2; font-size: 28px; }
.tile[data-value="256"] { background: #edcc61; color: #f9f6f2; font-size: 28px; }
.tile[data-value="512"] { background: #edc850; color: #f9f6f2; font-size: 28px; }
.tile[data-value="1024"] { background: #edc53f; color: #f9f6f2; font-size: 24px; }
.tile[data-value="2048"] { background: #edc22e; color: #f9f6f2; font-size: 24px; animation: pulse 0.5s; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
@keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
.tile.new { animation: pop 0.2s ease; }
.overlay { position: absolute; inset: 0; background: rgba(238,228,218,0.7); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
.overlay h2 { font-size: 36px; color: #776e65; }
.overlay.win { background: rgba(237,194,46,0.5); }
.overlay.win h2 { color: #f9f6f2; }
.msg { color: #776e65; font-size: 14px; margin-top: 8px; }
@media (max-width: 440px) { .board { width: 90vw; height: 90vw; } .tile { font-size: 24px; } h1 { font-size: 40px; } }
</style>
</head>
<body>
<div class="container">
  <h1>2048</h1>
  <div class="header">
    <div class="scores">
      <div class="score-box"><div class="label">Score</div><div class="value" id="score">0</div></div>
      <div class="score-box"><div class="label">Best</div><div class="value" id="best">0</div></div>
    </div>
    <button class="btn" id="newGame">New Game</button>
  </div>
  <div class="board" id="board"></div>
  <p class="msg">Use arrow keys or swipe to play</p>
</div>
<script>
const SIZE = 4;
let grid, score, best, gameOver, won;
const boardEl = document.getElementById('board');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');

function init() {
  grid = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  score = 0; gameOver = false; won = false;
  best = parseInt(localStorage.getItem('2048_best') || '0');
  addRandom(); addRandom(); render();
}

function addRandom() {
  const empty = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] === 0) empty.push([r, c]);
  if (empty.length === 0) return;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function render() {
  boardEl.innerHTML = '';
  const overlay = boardEl.querySelector('.overlay');
  if (overlay) overlay.remove();
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      const v = grid[r][c];
      if (v) { tile.textContent = v; tile.dataset.value = v; }
      boardEl.appendChild(tile);
    }
  }
  scoreEl.textContent = score;
  if (score > best) { best = score; localStorage.setItem('2048_best', best); }
  bestEl.textContent = best;
  if (gameOver) showOverlay('Game Over!', false);
  if (won) showOverlay('You Win!', true);
}

function showOverlay(msg, isWin) {
  const ov = document.createElement('div');
  ov.className = 'overlay' + (isWin ? ' win' : '');
  ov.innerHTML = '<h2>' + msg + '</h2><button class="btn" onclick="init()">Try Again</button>';
  boardEl.appendChild(ov);
}

function slide(row) {
  let arr = row.filter(v => v !== 0);
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i+1]) {
      arr[i] *= 2; score += arr[i];
      if (arr[i] === 2048) won = true;
      arr.splice(i+1, 1);
    }
  }
  while (arr.length < SIZE) arr.push(0);
  return arr;
}

function move(dir) {
  if (gameOver || won) return;
  const prev = JSON.stringify(grid);
  if (dir === 'left') {
    for (let r = 0; r < SIZE; r++) grid[r] = slide(grid[r]);
  } else if (dir === 'right') {
    for (let r = 0; r < SIZE; r++) grid[r] = slide(grid[r].reverse()).reverse();
  } else if (dir === 'up') {
    for (let c = 0; c < SIZE; c++) {
      let col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]];
      col = slide(col);
      for (let r = 0; r < SIZE; r++) grid[r][c] = col[r];
    }
  } else if (dir === 'down') {
    for (let c = 0; c < SIZE; c++) {
      let col = [grid[3][c], grid[2][c], grid[1][c], grid[0][c]];
      col = slide(col);
      for (let r = 0; r < SIZE; r++) grid[r][c] = col[SIZE-1-r];
    }
  }
  if (JSON.stringify(grid) !== prev) { addRandom(); checkGameOver(); render(); }
}

function checkGameOver() {
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      if (grid[r][c] === 0) return;
      if (c < SIZE-1 && grid[r][c] === grid[r][c+1]) return;
      if (r < SIZE-1 && grid[r][c] === grid[r+1][c]) return;
    }
  gameOver = true;
}

document.addEventListener('keydown', e => {
  const map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down', a:'left', d:'right', w:'up', s:'down' };
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

let tx, ty;
boardEl.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; });
boardEl.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;
  if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
});

document.getElementById('newGame').addEventListener('click', init);
init();
</script>
</body>
</html>
